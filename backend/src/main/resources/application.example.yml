# 复制为 application.yml 后按需填写：cp application.example.yml application.yml
server:
  port: 8080
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: interest-circle
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/interest_circle?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: YOUR_MYSQL_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
app:
  jwt:
    secret: REPLACE_WITH_LONG_RANDOM_SECRET_AT_LEAST_256_BITS
    expiration: 86400000
  upload:
    path: ./uploads/
  tencent-im:
    sdk-app-id: YOUR_SDK_APP_ID
    secret-key: YOUR_TENCENT_IM_SECRET_KEY
  qiniu:
    access-key: YOUR_QINIU_ACCESS_KEY
    secret-key: YOUR_QINIU_SECRET_KEY
    bucket: your-bucket
    domain: https://your-cdn-domain.example.com
